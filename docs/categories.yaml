components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Category:
      type: object
      required:
        - name
        - appearance
      properties:
        name:
          type: string
          example: "Design"
          description: Unique name of the category.
        appearance:
          type: object
          required:
            - icon
            - color
          properties:
            icon:
              type: string
              example: "path/to/icon.svg"
              description: Path to the category icon. Defaults to 'mocked-path-to-icon'.
            color:
              type: string
              example: "#66C42C"
              description: Color of the category icon. Defaults to '#66C42C'.
paths:
  /categories:
    get:
      tags:
        - Categories
      summary: Get a paginated and filtered list of categories
      description: Returns categories with optional filtering by name and pagination.
      operationId: getCategories
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Filter categories by name starting with this string.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number for pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Number of categories per page.
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  total:
                    type: integer
                    example: 57
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 3
        '401':
          description: Unauthorized – JWT token is missing or invalid
        '403':
          description: Forbidden – User doesn't have access