components:
  schemas:
    Category:
      type: object
      required:
        - name
        - appearance
      properties:
        name:
          type: string
          example: "Design"
          description: Unique name of the category.
        appearance:
          type: object
          required:
            - icon
            - color
          properties:
            icon:
              type: string
              example: "path/to/icon.svg"
              description: Path to the category icon. Defaults to 'mocked-path-to-icon'.
            color:
              type: string
              example: "#66C42C"
              description: Color of the category icon. Defaults to '#66C42C'.
