components:
  securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT
  schemas:
    Offer:
      type: object
      required:
        - price
        - proficiencyLevel
        - title
        - description
        - languages
        - authorRole
        - author
        - category
        - subject
        - status
      properties:
        price:
          type: number
          description: Price of the offer
          example: 50
        proficiencyLevel:
          type: string
          description: Proficiency level of the offer
          item:
            enum:
              - Beginner
              - Intermediate
              - Advanced
              - Test Preparation
              - Professional
              - Specialized
          example: Intermediate
        title:
          type: string
          description: Title of the offer
          example: "Sample Offer for Mathematics"
        description:
          type: string
          description: Detailed description of the offer
          example: "This offer includes full support for Mathematics, including homework help and test preparation."
        languages:
          type: array
          items:
            type: string
            enum:
              - English
              - Ukrainian
              - Polish
              - German
              - French
              - Spanish
              - Arabic
          description: List of languages spoken in the offer
          example: ["English", "Ukrainian"]
        authorRole:
          type: string
          description: Role of the author (either 'student' or 'tutor')
          enum:
            - student
            - tutor
          example: tutor
        author:
          type: string
          description: User ID of the author of the offer
          example: "5f8f8f8f8f8f8f8f8f8f8f8f"
        category:
          type: string
          description: Category ID under which the offer belongs
          example: "5f8f8f8f8f8f8f8f8f8f8f8f"
        subject:
          type: string
          description: Subject ID for the offer
          example: "5f8f8f8f8f8f8f8f8f8f8f8f"
        status:
          type: string
          description: Status of the offer
          enum:
            - active
            - draft
            - closed
          default: active
          example: active
        FAQ:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
                description: The FAQ question
                example: "What is included?"
              answer:
                type: string
                description: The answer to the FAQ question
                example: "The offer includes full support for the subject."
      example:
        price: 50
        proficiencyLevel: Intermediate
        title: "Sample Offer for Mathematics"
        description: "This offer includes full support for Mathematics, including homework help and test preparation."
        languages: ["English", "Ukrainian"]
        authorRole: tutor
        author: "5f8f8f8f8f8f8f8f8f8f8f8f"
        category: "5f8f8f8f8f8f8f8f8f8f8f8f"
        subject: "5f8f8f8f8f8f8f8f8f8f8f8f"
        status: active
        FAQ:
          - question: "What is included?"
            answer: "The offer includes full support for the subject."
          - question: "Who is it for?"
            answer: "It is for students of all levels."
paths:
  /offers:
    get:
      summary: Get a list of all offers
      description: Returns all available offers in the system.
      tags:
        - Offers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of offers successfully retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          description: Unique identifier of the offer
                        price:
                          type: number
                          description: Price of the offer
                        proficiencyLevel:
                          type: string
                          description: Proficiency level
                          enum:
                            - Beginner
                            - Intermediate
                            - Advanced
                            - Test Preparation
                            - Professional
                            - Specialized
                        title:
                          type: string
                          description: Title of the offer
                        description:
                          type: string
                          description: Description of the offer
                        languages:
                          type: array
                          items:
                            type: string
                            enum:
                            - English
                            - Ukrainian
                            - Polish
                            - German
                            - French
                            - Spanish
                            - Arabic
                          description: Languages available for the offer
                        authorRole:
                          type: string
                          description: Role of the author of the offer
                          enum:
                            - student
                            - tutor
                        author:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: Unique identifier of the author
                            firstName:
                              type: string
                              description: First name of the author
                            lastName:
                              type: string
                              description: Last name of the author
                            totalReviews:
                              type: object
                              properties:
                                student:
                                  type: number
                                  description: Total number of reviews from students
                                tutor:
                                  type: number
                                  description: Total number of reviews from tutors
                            averageRating:
                              type: object
                              properties:
                                student:
                                  type: number
                                  description: Average rating from students
                                tutor:
                                  type: number
                                  description: Average rating from tutors
                            nativeLanguage:
                              type: array
                              items:
                                type: string
                              description: Native languages of the author
                        category:
                          type: string
                          description: Category of the offer
                        subject:
                          type: string
                          description: Subject related to the offer
                        status:
                          type: string
                          description: Status of the offer
                          enum:
                            - active
                            - draft
                            - closed
                        FAQ:
                          type: array
                          items:
                            type: object
                            properties:
                              question:
                                type: string
                                description: FAQ question
                              answer:
                                type: string
                                description: FAQ answer
                        createdAt:
                          type: string
                          format: date-time
                          description: Offer creation date
                        updatedAt:
                          type: string
                          format: date-time
                          description: Offer last update date
        '400':
          description: Bad request
        '500':
          description: Server error
  paths:
  /offers/{id}:
    get:
      summary: Get an offer by ID
      description: Returns a single offer by its unique ID, including author, subject, and category details.
      tags:
        - Offers
      parameters:
        - name: id
          in: path
          required: true
          type: string
          description: ID of the offer to retrieve
      responses:
        '200':
          description: Offer successfully retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  price:
                    type: number
                  proficiencyLevel:
                    type: string
                    enum:
                      - Beginner
                      - Intermediate
                      - Advanced
                      - Test Preparation
                      - Professional
                      - Specialized
                  title:
                    type: string
                  description:
                    type: string
                  languages:
                    type: array
                    items:
                      type: string
                      enum:
                        - English
                        - Ukrainian
                        - Polish
                        - German
                        - French
                        - Spanish
                        - Arabic
                    example: ["English"]
                  authorRole:
                    type: string
                    enum:
                      - student
                      - tutor
                  author:
                    type: object
                    properties:
                      _id:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      totalReviews:
                        type: object
                        properties:
                          student:
                            type: number
                          tutor:
                            type: number
                      averageRating:
                        type: object
                        properties:
                          student:
                            type: number
                          tutor:
                            type: number
                  category:
                    type: object
                    properties:
                      _id:
                        type: string
                      appearance:
                        type: object
                        properties:
                          icon:
                            type: string
                          color:
                            type: string
                  subject:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                  status:
                    type: string
                    enum:
                      - active
                      - draft
                      - closed
                  FAQ:
                    type: array
                    items:
                      type: object
                      properties:
                        question:
                          type: string
                        answer:
                          type: string
                        _id:
                          type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid ID or request
        '404':
          description: Offer not found
        '500':
          description: Internal server error
