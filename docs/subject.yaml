components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Subject:
      type: object
      required:
        - name
        - category
      properties:
        _id:
          type: string
          description: The unique identifier of the subject
          example: "60c72b2f5f9b2f1b32c87c2a"
        name:
          type: string
          description: The name of the subject
          example: "Math"
        category:
          type: string
          description: The category ID to which the subject belongs (references a category)
          example: "60c72b2f5f9b2f1b32c87c2b"
        totalOffers:
          type: object
          properties:
            student:
              type: integer
              description: The number of offers available for students in this subject
              example: 100
            tutor:
              type: integer
              description: The number of offers available for tutors in this subject
              example: 25
        createdAt:
          type: string
          format: date-time
          description: The time when the subject was created
          example: "2021-06-24T15:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: The last time the subject was updated
          example: "2021-06-24T16:00:00Z"

paths:
  /subjects:
    get:
      tags:
        - Subjects
      summary: Get a paginated and filtered list of subjects
      description: Returns subjects with optional filtering by name and pagination.
      operationId: getSubjects
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Filter subjects by name starting with this string.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number for pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Number of subjects per page.
      responses:
        '200':
          description: List of subjects
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subject'
                    example:
                      - _id: "680aba16c2b544ce98e8d35b"
                        name: "JavaScript"
                        category:
                          _id: "68081d3202a459c8915433c7"
                          name: "Development"
                          appearance:
                            icon: "icons/dev.svg"
                            color: "#66C42C"
                        totalOffers:
                          student: 0
                          tutor: 0
                        createdAt: "2025-04-24T22:24:22.404Z"
                        updatedAt: "2025-04-24T22:24:22.404Z"
                  total:
                    type: integer
                    example: 3
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 1
        '401':
          description: Unauthorized – JWT token is missing or invalid
        '403':
          description: Forbidden – User doesn't have access
  /subjects/{id}:
    get:
      tags:
        - Subjects
      summary: Get subject by ID
      description: This endpoint allows you to get detailed information about a subject by its unique identifier.
      operationId: getSubjectById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The unique identifier of the subject
          schema:
            type: string
      responses:
        '200':
          description: Successful response — subject found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject' 
                type: object
                properties:
                  _id:
                    type: string
                    description: The unique identifier of the subject
                  name:
                    type: string
                    description: The name of the subject
                  category:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The ID of the category
                      name:
                        type: string
                        description: The name of the category
                      appearance:
                        type: object
                        properties:
                          icon:
                            type: string
                            description: The path to the category's icon
                          color:
                            type: string
                            description: The color of the category in HEX format
                  createdAt:
                    type: string
                    format: date-time
                    description: The time the subject was created
                  updatedAt:
                    type: string
                    format: date-time
                    description: The time the subject was last updated
        '400':
          description: Invalid subject ID format
        '404':
          description: Subject not found